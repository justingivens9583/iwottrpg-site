    <div class="nav-section">

  <!-- ══════ CONTENT ══════ -->
  <div class="page-wrapper">

    <div class="page-header">
      <span class="page-eyebrow">The Chronicle</span>
      <h1 class="page-title">Session Notes</h1>
      <span class="page-subtitle">A record of every adventure</span>
      <div class="page-divider"></div>
    </div>

    <div class="notes-tabs" id="noteTabs">
      <button class="active" onclick="switchDoc('summary', this)">📜 Summary</button>
      <button onclick="switchDoc('andrew', this)">Andrew</button>
      <button onclick="switchDoc('brandon', this)">Brandon</button>
      <button onclick="switchDoc('josh', this)">Josh</button>
      <button onclick="switchDoc('justin', this)">Justin</button>
      <button onclick="switchDoc('katie', this)">Katie</button>
      <button onclick="switchDoc('sydney', this)">Sydney</button>
    </div>

    <button class="open-doc-btn" onclick="openDoc()">↗ Open Full Document</button>

    <div class="notes-frame-box">
      <iframe
        id="notesFrame"
        src=""
        width="100%"
        height="900"
        frameborder="0">
      </iframe>
    </div>

  </div>

  <script>
    const docs = {
      andrew:  "1q8U9ZXZVIjYX_JH_tAMX9fY1pBoDVUX-rLQ-Yi_IpVE",
      brandon: "1QtJXD3y8xJv7wXQqYNf3f_RtT0dqNxl01cSJMsANCGY",
      josh:    "1V11GbV1nm0QQ6eNqPHv4P6sP7gylikZmgkTA6h2MowA",
      justin:  "17wGta90iTcUbJX9y8uC8_wnh6_nSoLu1NfBHQJ21Dak",
      katie:   "1NM13Wkm8h180w9aUWtl-W4y7dqJawkuZUG0B_5b-JDU",
      sydney:  "1eib0VhceozJdx2mSUBNHNpIhtYiUFzNb9keeeu1XEZQ",
      summary: "1QX5QCXgr3yEjrQBdAgTDxRQUw--1GbtzlQLD_3XkQcU"
    };

    function switchDoc(name, btn) {
      const id = docs[name];
      document.getElementById("notesFrame").src =
        `https://docs.google.com/document/d/${id}/preview`;
      document.querySelectorAll('.notes-tabs button').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    function openDoc() {
      const frame = document.getElementById("notesFrame");
      const url = frame.src.replace("/preview", "/edit");
      window.open(url, "_blank");
    }

    switchDoc("summary");
  </script>

</body>
</html>
