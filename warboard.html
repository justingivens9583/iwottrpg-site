<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The War Board — Raiders Camp</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0d0a06;
    --stone: #3a3028;
    --stone-light: #5a4a3a;
    --glow: rgba(201,168,76,0.4);
    --toolbar-bg: rgba(10,8,4,0.92);
    --panel-w: 220px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    font-family: 'Crimson Text', Georgia, serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    height: 52px;
    background: linear-gradient(to bottom, #0f0c08, #0a0704);
    border-bottom: 1px solid var(--stone);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
    z-index: 100;
  }

  .header-title {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 3px;
    text-shadow: 0 0 20px var(--glow);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-title::before {
    content: '⚔';
    font-size: 18px;
    color: var(--gold);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .hdr-btn {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid var(--stone-light);
    background: transparent;
    color: var(--gold);
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .hdr-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .hdr-btn.danger { color: #c0503a; border-color: #5a2a1a; }
  .hdr-btn.danger:hover { border-color: #c0503a; background: rgba(192,80,58,0.08); }
  .hdr-btn.save-btn { color: var(--dark); background: linear-gradient(135deg, var(--gold-light), var(--gold)); border-color: var(--gold); }
  .hdr-btn.save-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,168,76,0.3); }

  .save-status {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: #5a4a3a;
    text-transform: uppercase;
  }
  .save-status.saving { color: var(--gold); animation: blink 0.8s ease-in-out infinite; }
  .save-status.saved { color: #6a8a5a; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── MAIN LAYOUT ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── TOOLBAR PANEL ── */
  .toolbar {
    width: var(--panel-w);
    background: var(--toolbar-bg);
    border-right: 1px solid var(--stone);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .toolbar::-webkit-scrollbar { width: 3px; }
  .toolbar::-webkit-scrollbar-thumb { background: var(--stone-light); }

  .tool-section {
    padding: 14px 12px;
    border-bottom: 1px solid var(--stone);
  }

  .tool-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .tool-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tool-btn {
    flex: 1;
    min-width: 44px;
    padding: 8px 4px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--stone);
    border-radius: 3px;
    color: #8a7a60;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .tool-btn span {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #5a4a3a;
  }
  .tool-btn:hover { border-color: var(--stone-light); color: var(--gold); }
  .tool-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold-light); }
  .tool-btn.active span { color: var(--gold); }

  /* Color picker */
  .color-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: white; transform: scale(1.15); }

  /* Brush size */
  .size-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .size-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--stone-light);
    border-radius: 2px;
    outline: none;
  }
  .size-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
  }

  .size-preview {
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .size-dot {
    background: var(--gold);
    border-radius: 50%;
  }

  /* Token list */
  .token-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 320px;
    overflow-y: auto;
  }
  .token-list::-webkit-scrollbar { width: 3px; }
  .token-list::-webkit-scrollbar-thumb { background: var(--stone-light); }

  .token-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border: 1px solid var(--stone);
    border-radius: 3px;
    cursor: grab;
    background: rgba(255,255,255,0.02);
    transition: all 0.15s;
    user-select: none;
  }
  .token-item:hover { border-color: var(--stone-light); background: rgba(201,168,76,0.05); }
  .token-item:active { cursor: grabbing; }

  .token-thumb {
    width: 28px; height: 28px;
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid var(--stone-light);
    background: #2a2018;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .token-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

  .token-info { flex: 1; min-width: 0; }
  .token-name { font-family: 'Cinzel', serif; font-size: 10px; color: var(--gold); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .token-class { font-size: 10px; color: #6a5a44; font-style: italic; }

  .token-add-btn {
    font-size: 14px;
    color: #5a4a3a;
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 2px;
    transition: color 0.15s;
  }
  .token-add-btn:hover { color: var(--gold); }

  /* Note input */
  .note-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--stone);
    border-radius: 3px;
    color: #c0a870;
    font-family: 'Crimson Text', serif;
    font-size: 13px;
    padding: 8px;
    resize: none;
    height: 70px;
    outline: none;
    transition: border-color 0.15s;
  }
  .note-input:focus { border-color: var(--stone-light); }
  .note-input::placeholder { color: #4a3a28; }

  .place-note-btn {
    width: 100%;
    margin-top: 6px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--stone-light);
    padding: 7px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .place-note-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.15); }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #080604;
  }

  #mapCanvas {
    position: absolute;
    top: 0; left: 0;
    cursor: crosshair;
  }

  /* ── FLOATING TOKENS ON CANVAS ── */
  .placed-token {
    position: absolute;
    width: 56px; height: 72px;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid var(--gold);
    box-shadow: 0 0 10px rgba(201,168,76,0.4), 0 2px 8px rgba(0,0,0,0.6);
    cursor: move;
    user-select: none;
    z-index: 10;
    background: #1a1208;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: box-shadow 0.15s;
  }
  .placed-token:hover { box-shadow: 0 0 16px rgba(201,168,76,0.7), 0 2px 8px rgba(0,0,0,0.6); }
  .placed-token img { width: 100%; height: 100%; object-fit: cover; object-position: top center; pointer-events: none; user-drag: none; -webkit-user-drag: none; }

  .token-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 8px;
    color: var(--gold-light);
    white-space: nowrap;
    text-shadow: 0 1px 3px #000, 0 0 8px #000;
    pointer-events: none;
  }

  .token-remove {
    position: absolute;
    top: -4px; right: -4px;
    width: 16px; height: 16px;
    background: #8b1a1a;
    border: 1px solid #c03030;
    border-radius: 50%;
    color: white;
    font-size: 10px;
    line-height: 14px;
    text-align: center;
    cursor: pointer;
    display: none;
    z-index: 11;
  }
  .placed-token:hover .token-remove { display: block; }

  /* ── FLOATING NOTES ── */
  .placed-note {
    position: absolute;
    background: rgba(20, 16, 8, 0.92);
    border: 1px solid var(--stone-light);
    border-left: 3px solid var(--gold);
    border-radius: 3px;
    padding: 8px 10px;
    min-width: 120px;
    max-width: 200px;
    cursor: move;
    user-select: none;
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .note-text {
    font-family: 'Crimson Text', serif;
    font-size: 12px;
    color: #c0a870;
    line-height: 1.4;
    word-break: break-word;
    pointer-events: none;
  }

  .note-remove {
    position: absolute;
    top: -5px; right: -5px;
    width: 16px; height: 16px;
    background: #8b1a1a;
    border: 1px solid #c03030;
    border-radius: 50%;
    color: white;
    font-size: 10px;
    line-height: 14px;
    text-align: center;
    cursor: pointer;
    display: none;
    z-index: 11;
  }
  .placed-note:hover .note-remove { display: block; }

  /* ── CLEAR CONFIRM MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: linear-gradient(160deg, #1e1812, #0f0c08);
    border: 1px solid var(--stone-light);
    border-radius: 4px;
    padding: 32px 40px;
    text-align: center;
    max-width: 360px;
  }

  .modal-icon { font-size: 40px; margin-bottom: 12px; }
  .modal-title { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold-light); margin-bottom: 8px; }
  .modal-body { font-family: 'Crimson Text', serif; font-style: italic; color: #8a7a60; font-size: 14px; margin-bottom: 24px; }

  .modal-buttons { display: flex; gap: 12px; justify-content: center; }

  .modal-btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 3px;
    transition: transform 0.15s;
  }
  .modal-btn:hover { transform: translateY(-1px); }
  .modal-btn.confirm { background: #8b1a1a; color: white; }
  .modal-btn.cancel { background: transparent; color: var(--gold); border: 1px solid var(--stone-light); }

  /* ── LOADING OVERLAY ── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,8,4,0.85);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .loading-text {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.8;
    animation: blink 1.5s ease-in-out infinite;
  }

  .loading-rune { font-size: 40px; animation: spin 3s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- ══════ HEADER ══════ -->
<header>
  <div class="header-title">The War Board — Raiders Camp</div>
  <div class="header-actions">
    <span class="save-status" id="saveStatus">All changes saved</span>
    <button class="hdr-btn save-btn" onclick="saveBoard()">💾 Save</button>
    <button class="hdr-btn" onclick="loadBoard()">↺ Refresh</button>
    <button class="hdr-btn danger" onclick="openClearModal()">🗑 Clear All</button>
  </div>
</header>

<!-- ══════ WORKSPACE ══════ -->
<div class="workspace">

  <!-- ── TOOLBAR ── -->
  <div class="toolbar">

    <!-- Tools -->
    <div class="tool-section">
      <div class="tool-label">Tools</div>
      <div class="tool-row">
        <button class="tool-btn active" id="tool-draw" onclick="setTool('draw')">✏️<span>Draw</span></button>
        <button class="tool-btn" id="tool-arrow" onclick="setTool('arrow')">➡️<span>Arrow</span></button>
        <button class="tool-btn" id="tool-erase" onclick="setTool('erase')">🧹<span>Erase</span></button>
      </div>
    </div>

    <!-- Color -->
    <div class="tool-section">
      <div class="tool-label">Color</div>
      <div class="color-row">
        <div class="color-swatch active" style="background:#f0d080" onclick="setColor('#f0d080')" title="Gold"></div>
        <div class="color-swatch" style="background:#e05050" onclick="setColor('#e05050')" title="Red"></div>
        <div class="color-swatch" style="background:#50b0e0" onclick="setColor('#50b0e0')" title="Blue"></div>
        <div class="color-swatch" style="background:#70d070" onclick="setColor('#70d070')" title="Green"></div>
        <div class="color-swatch" style="background:#d070d0" onclick="setColor('#d070d0')" title="Purple"></div>
        <div class="color-swatch" style="background:#f0a040" onclick="setColor('#f0a040')" title="Orange"></div>
        <div class="color-swatch" style="background:#ffffff" onclick="setColor('#ffffff')" title="White"></div>
      </div>
    </div>

    <!-- Brush Size -->
    <div class="tool-section">
      <div class="tool-label">Brush Size</div>
      <div class="size-row">
        <input type="range" min="1" max="20" value="3" id="brushSize" oninput="updateBrushPreview()">
        <div class="size-preview">
          <div class="size-dot" id="sizeDot" style="width:6px;height:6px"></div>
        </div>
      </div>
    </div>

    <!-- Character Tokens -->
    <div class="tool-section">
      <div class="tool-label">Place Tokens</div>
      <div class="token-list" id="tokenList"></div>
    </div>

    <!-- Notes -->
    <div class="tool-section">
      <div class="tool-label">Add Note</div>
      <textarea class="note-input" id="noteInput" placeholder="Type your note here..."></textarea>
      <button class="place-note-btn" onclick="placeNote()">+ Place Note on Map</button>
    </div>

  </div>

  <!-- ── CANVAS AREA ── -->
  <div class="canvas-area" id="canvasArea">
    <canvas id="mapCanvas"></canvas>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-rune">⚔</div>
      <div class="loading-text">Loading the War Board...</div>
    </div>
  </div>
</div>

<!-- ══════ CLEAR MODAL ══════ -->
<div class="modal-overlay" id="clearModal">
  <div class="modal">
    <div class="modal-icon">🔥</div>
    <div class="modal-title">Clear the War Board?</div>
    <div class="modal-body">"All drawings, tokens, and notes will be lost to the ages. This cannot be undone."</div>
    <div class="modal-buttons">
      <button class="modal-btn confirm" onclick="clearAll()">Clear Everything</button>
      <button class="modal-btn cancel" onclick="closeClearModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const JSONBIN_ID  = '69a6f62dae596e708f5b4c43';
const JSONBIN_KEY = '$2a$10$dmmW.BkgP6HNVGgCTh8rUeO7XwnMgZviE3DE630J5m/QVyjXyiYdy';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;
const MAP_IMAGE   = 'maps/raiders_camp_map.webp';

const CHARACTERS = [
  { name: "Baradren",      charClass: "Ranger",    sprite: "game_art/baradren_game_art.png",    emoji: "🏹" },
  { name: "Fuzzy",         charClass: "Cleric",    sprite: "game_art/angus_game_art.png",       emoji: "✝️" },
  { name: "Crow",          charClass: "Rogue",     sprite: "game_art/crow_game_art.png",        emoji: "🗡️" },
  { name: "Elias",         charClass: "Wizard",    sprite: "game_art/elias_game_art.png",       emoji: "🔮" },
  { name: "Farghus",       charClass: "Barbarian", sprite: "game_art/farghus_game_art.png",     emoji: "🪓" },
  { name: "LL",            charClass: "Paladin",   sprite: "game_art/gingerbeard_game_art.png", emoji: "🛡️" },
  { name: "Lucyana",       charClass: "Warlock",   sprite: "game_art/lucyana_game_art.png",     emoji: "🐙" },
  { name: "Obadiah",       charClass: "Fighter",   sprite: "game_art/obadiah_game_art.png",     emoji: "⚔️" },
  { name: "Storm Elder",   charClass: "Fighter",   sprite: "game_art/older_game_art.png",       emoji: "⚔️" },
  { name: "Perkas",        charClass: "Wizard",    sprite: "game_art/perkas_game_art.png",      emoji: "🔮" },
  { name: "Squeak",        charClass: "Artificer", sprite: "game_art/squeak_game_art.png",      emoji: "🔫" },
  { name: "Storm Younger", charClass: "Barbarian", sprite: "game_art/younger_game_art.png",     emoji: "🪓" },
];

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let currentTool = 'draw';
let currentColor = '#f0d080';
let brushSize = 3;
let isDrawing = false;
let drawStart = null;
let livePoints = [];
let mousePos = { x: 0, y: 0 }; // always tracks current mouse position

// Board data
let drawings = [];
let arrows = [];
let tokens = [];
let notes = [];

// Canvas
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const canvasArea = document.getElementById('canvasArea');
let mapImg = null;
let CW, CH;

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  buildTokenList();
  resizeCanvas();
  loadMapImage(() => loadBoard());
  window.addEventListener('resize', () => { resizeCanvas(); redraw(); });
});

function resizeCanvas() {
  CW = canvasArea.clientWidth;
  CH = canvasArea.clientHeight;
  canvas.width = CW;
  canvas.height = CH;
}

function loadMapImage(cb) {
  mapImg = new Image();
  mapImg.onload = () => { redraw(); cb && cb(); };
  mapImg.onerror = () => { cb && cb(); };
  mapImg.src = MAP_IMAGE;
}

// ══════════════════════════════════════════════════════════════
//  JSONBIN
// ══════════════════════════════════════════════════════════════
async function loadBoard() {
  setStatus('saving');
  try {
    const res = await fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    const data = await res.json();
    const rec = data.record || {};
    drawings = rec.drawings || [];
    arrows   = rec.arrows   || [];
    tokens   = rec.tokens   || [];
    notes    = rec.notes    || [];
    redraw();
    rebuildDOMTokens();
    rebuildDOMNotes();
    setStatus('saved');
  } catch(e) {
    console.warn('Load failed:', e);
    setStatus('idle');
  }
  document.getElementById('loadingOverlay').style.display = 'none';
}

async function saveBoard() {
  setStatus('saving');
  try {
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify({ drawings, arrows, tokens, notes })
    });
    setStatus('saved');
  } catch(e) {
    console.warn('Save failed:', e);
    setStatus('idle');
  }
}

function setStatus(state) {
  const el = document.getElementById('saveStatus');
  el.className = 'save-status';
  if (state === 'saving') { el.textContent = 'Saving...'; el.classList.add('saving'); }
  else if (state === 'saved') { el.textContent = 'All changes saved'; el.classList.add('saved'); }
  else { el.textContent = ''; }
}

// ══════════════════════════════════════════════════════════════
//  TOOLS
// ══════════════════════════════════════════════════════════════
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + tool).classList.add('active');
  canvas.style.cursor = tool === 'erase' ? 'none' : 'crosshair';
}

function setColor(c) {
  currentColor = c;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  event.target.classList.add('active');
}

function updateBrushPreview() {
  brushSize = parseInt(document.getElementById('brushSize').value);
  const dot = document.getElementById('sizeDot');
  const sz = Math.max(3, brushSize * 2);
  dot.style.width = sz + 'px';
  dot.style.height = sz + 'px';
}

// ══════════════════════════════════════════════════════════════
//  CANVAS DRAWING
// ══════════════════════════════════════════════════════════════
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', continueDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', e => { endDraw(e); redraw(); }); // clear eraser ring on leave
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); continueDraw(e); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(e); }, { passive: false });

function startDraw(e) {
  const pos = getPos(e);
  isDrawing = true;
  drawStart = pos;
  mousePos = pos;
  livePoints = [pos];
}

function continueDraw(e) {
  const pos = getPos(e);
  mousePos = pos;

  if (currentTool === 'draw' && isDrawing) {
    livePoints.push(pos);
    redraw();
    ctx.save();
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    livePoints.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.restore();
  } else if (currentTool === 'arrow' && isDrawing) {
    redraw();
    drawArrowPreview(drawStart, pos);
  } else if (currentTool === 'erase') {
    if (isDrawing) eraseAt(pos);
    // Always show eraser ring while hovering
    redraw();
    drawEraserCursor(pos);
  }
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;

  if (currentTool === 'draw' && livePoints.length > 1) {
    drawings.push({ color: currentColor, size: brushSize, points: [...livePoints] });
    redraw();
  } else if (currentTool === 'arrow' && drawStart) {
    // Use tracked mousePos for reliable end position
    arrows.push({ color: currentColor, size: brushSize, x1: drawStart.x, y1: drawStart.y, x2: mousePos.x, y2: mousePos.y });
    redraw();
  }

  livePoints = [];
  drawStart = null;
}

function eraseAt(pos) {
  const r = brushSize * 6;
  drawings = drawings.filter(d => !d.points.some(p => Math.hypot(p.x - pos.x, p.y - pos.y) < r));
  arrows = arrows.filter(a => {
    const mx = (a.x1 + a.x2) / 2, my = (a.y1 + a.y2) / 2;
    return Math.hypot(mx - pos.x, my - pos.y) >= r;
  });
  redraw();
}

function drawEraserCursor(pos) {
  const r = brushSize * 6;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════
function redraw() {
  ctx.clearRect(0, 0, CW, CH);

  // Map background
  if (mapImg && mapImg.complete && mapImg.naturalWidth) {
    ctx.drawImage(mapImg, 0, 0, CW, CH);
  } else {
    ctx.fillStyle = '#1a1208';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#3a2a14';
    ctx.font = '16px Cinzel, serif';
    ctx.textAlign = 'center';
    ctx.fillText('Map loading...', CW/2, CH/2);
  }

  // Drawings
  drawings.forEach(d => {
    if (d.points.length < 2) return;
    ctx.save();
    ctx.strokeStyle = d.color;
    ctx.lineWidth = d.size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    d.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.restore();
  });

  // Arrows
  arrows.forEach(a => drawArrowFull(a));
}

function drawArrowFull(a) {
  ctx.save();
  ctx.strokeStyle = a.color;
  ctx.fillStyle = a.color;
  ctx.lineWidth = a.size;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.9;

  const dx = a.x2 - a.x1, dy = a.y2 - a.y1;
  const angle = Math.atan2(dy, dx);
  const len = Math.hypot(dx, dy);
  const headLen = Math.min(20, len * 0.4);

  ctx.beginPath();
  ctx.moveTo(a.x1, a.y1);
  ctx.lineTo(a.x2, a.y2);
  ctx.stroke();

  // Arrowhead
  ctx.beginPath();
  ctx.moveTo(a.x2, a.y2);
  ctx.lineTo(a.x2 - headLen * Math.cos(angle - 0.4), a.y2 - headLen * Math.sin(angle - 0.4));
  ctx.lineTo(a.x2 - headLen * Math.cos(angle + 0.4), a.y2 - headLen * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawArrowPreview(from, to) {
  ctx.save();
  ctx.strokeStyle = currentColor;
  ctx.fillStyle = currentColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.6;
  ctx.setLineDash([6, 4]);

  const dx = to.x - from.x, dy = to.y - from.y;
  const angle = Math.atan2(dy, dx);
  const len = Math.hypot(dx, dy);
  const headLen = Math.min(20, len * 0.4);

  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(to.x, to.y);
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(to.x, to.y);
  ctx.lineTo(to.x - headLen * Math.cos(angle - 0.4), to.y - headLen * Math.sin(angle - 0.4));
  ctx.lineTo(to.x - headLen * Math.cos(angle + 0.4), to.y - headLen * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════
//  TOKENS
// ══════════════════════════════════════════════════════════════
function buildTokenList() {
  const list = document.getElementById('tokenList');
  list.innerHTML = '';
  CHARACTERS.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'token-item';
    item.innerHTML = `
      <div class="token-thumb">
        ${c.sprite ? `<img src="${c.sprite}" alt="${c.name}" onerror="this.style.display='none';this.parentElement.textContent='${c.emoji}'">` : c.emoji}
      </div>
      <div class="token-info">
        <span class="token-name">${c.name}</span>
        <span class="token-class">${c.charClass}</span>
      </div>
      <button class="token-add-btn" onclick="placeToken(${i})" title="Place on map">＋</button>
    `;
    list.appendChild(item);
  });
}

function placeToken(charIndex) {
  const id = Date.now() + Math.random();
  const token = { id, charIndex, x: CW / 2 - 22, y: CH / 2 - 22 };
  tokens.push(token);
  createTokenDOM(token);
}

function createTokenDOM(token) {
  const c = CHARACTERS[token.charIndex];
  const el = document.createElement('div');
  el.className = 'placed-token';
  el.id = 'token-' + token.id;
  el.style.left = token.x + 'px';
  el.style.top = token.y + 'px';
  el.innerHTML = `
    ${c.sprite ? `<img src="${c.sprite}" alt="${c.name}" onerror="this.style.display='none';this.parentElement.textContent='${c.emoji}'">` : c.emoji}
    <div class="token-label">${c.name}</div>
    <div class="token-remove" onclick="removeToken('${token.id}')">✕</div>
  `;
  makeDraggable(el, token);
  canvasArea.appendChild(el);
}

function removeToken(id) {
  tokens = tokens.filter(t => String(t.id) !== String(id));
  const el = document.getElementById('token-' + id);
  if (el) el.remove();
}

function rebuildDOMTokens() {
  document.querySelectorAll('.placed-token').forEach(e => e.remove());
  tokens.forEach(t => createTokenDOM(t));
}

// ══════════════════════════════════════════════════════════════
//  NOTES
// ══════════════════════════════════════════════════════════════
function placeNote() {
  const text = document.getElementById('noteInput').value.trim();
  if (!text) return;
  const id = Date.now() + Math.random();
  const note = { id, text, x: CW / 2 - 60, y: CH / 2 - 20 };
  notes.push(note);
  createNoteDOM(note);
  document.getElementById('noteInput').value = '';
}

function createNoteDOM(note) {
  const el = document.createElement('div');
  el.className = 'placed-note';
  el.id = 'note-' + note.id;
  el.style.left = note.x + 'px';
  el.style.top = note.y + 'px';
  el.innerHTML = `
    <div class="note-text">${note.text}</div>
    <div class="note-remove" onclick="removeNote('${note.id}')">✕</div>
  `;
  makeDraggable(el, note);
  canvasArea.appendChild(el);
}

function removeNote(id) {
  notes = notes.filter(n => String(n.id) !== String(id));
  const el = document.getElementById('note-' + id);
  if (el) el.remove();
}

function rebuildDOMNotes() {
  document.querySelectorAll('.placed-note').forEach(e => e.remove());
  notes.forEach(n => createNoteDOM(n));
}

// ══════════════════════════════════════════════════════════════
//  DRAGGING
// ══════════════════════════════════════════════════════════════
function makeDraggable(el, dataObj) {
  let startX, startY, startLeft, startTop, dragging = false;

  function onDown(e) {
    if (e.target.classList.contains('token-remove') || e.target.classList.contains('note-remove')) return;
    e.stopPropagation();
    e.preventDefault();
    dragging = true;
    const src = e.touches ? e.touches[0] : e;
    startX = src.clientX;
    startY = src.clientY;
    startLeft = parseInt(el.style.left) || 0;
    startTop = parseInt(el.style.top) || 0;
    el.style.zIndex = 20;
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const src = e.touches ? e.touches[0] : e;
    const dx = src.clientX - startX, dy = src.clientY - startY;
    const newLeft = Math.max(0, Math.min(CW - 50, startLeft + dx));
    const newTop = Math.max(0, Math.min(CH - 50, startTop + dy));
    el.style.left = newLeft + 'px';
    el.style.top = newTop + 'px';
    dataObj.x = newLeft;
    dataObj.y = newTop;
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    el.style.zIndex = 10;
  }

  // Prevent browser native drag on the element and its images
  el.addEventListener('dragstart', e => e.preventDefault());
  el.querySelectorAll('img').forEach(img => img.addEventListener('dragstart', e => e.preventDefault()));

  el.addEventListener('mousedown', onDown);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  el.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);
}

// ══════════════════════════════════════════════════════════════
//  CLEAR
// ══════════════════════════════════════════════════════════════
function openClearModal() { document.getElementById('clearModal').classList.add('open'); }
function closeClearModal() { document.getElementById('clearModal').classList.remove('open'); }

async function clearAll() {
  drawings = []; arrows = []; tokens = []; notes = [];
  redraw();
  rebuildDOMTokens();
  rebuildDOMNotes();
  closeClearModal();
  await saveBoard();
}
</script>
