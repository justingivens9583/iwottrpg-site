    <div class="nav-section">

      <a href="calendar.html"><span class="nav-icon">📅</span> Calendar</a>
      <a href="https://drive.google.com/file/d/1GnxzF5Nyht1wA8ru7eCaglsKCsq2jS4V/view?usp=sharing" target="_blank"><span class="nav-icon">🗺</span> World Map</a>
    </div>
    <div class="nav-section">
      <span class="nav-section-label">Tools</span>
      <a href="archivist.html"><span class="nav-icon">📖</span> Lore Master</a>

    </div>
    <div class="nav-footer">
      <p class="nav-footer-text">"The adventure<br>continues..."</p>
    </div>
  </div>

  <!-- ══════ CONTENT ══════ -->
  <div class="page-wrapper">

    <div class="page-header">
      <span class="page-eyebrow">Know Before You Go</span>
      <h1 class="page-title">Travel Guides</h1>
      <span class="page-subtitle">Essential knowledge for the well-prepared adventurer</span>
      <div class="page-divider"></div>
    </div>

    <div class="notes-tabs" id="guideTabs">
      <button class="active" onclick="switchGuide('guides/elturel_visitors_guide.pdf', this)">🏛 Elturel</button>
      <!-- Add more guides here by copying the line above:
      <button onclick="switchGuide('guides/your_guide.pdf', this)">🗺 Location Name</button>
      -->
    </div>

    <button class="open-doc-btn" id="openGuideBtn" onclick="openGuide()">↗ Open Full Document</button>

    <div class="notes-frame-box">
      <iframe
        id="guideFrame"
        src=""
        width="100%"
        height="900"
        frameborder="0">
      </iframe>
    </div>

  </div>

  <script>
    let currentGuide = '';

    function switchGuide(path, btn) {
      currentGuide = path;
      document.getElementById('guideFrame').src = path;
      document.querySelectorAll('#guideTabs button').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    function openGuide() {
      if (currentGuide) window.open(currentGuide, '_blank');
    }

    // Load first guide on page open
    switchGuide('guides/elturel_visitors_guide.pdf');
  </script>

</body>
